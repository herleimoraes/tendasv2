<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>App Produção</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    .bg-gradient-primary { background: linear-gradient(135deg, #0d6efd, #6610f2); }
    .card-mobile { border: none; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
    .badge-fase { font-size: 0.75rem; padding: 6px 10px; border-radius: 8px; font-weight: 600; width: 100%; text-align: left; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div id="tela-login" class="screen active min-vh-100 d-flex align-items-center justify-content-center bg-gradient-primary p-4">
    <div class="bg-white p-4 rounded-4 shadow-lg w-100" style="max-width: 400px;">
      <div class="text-center mb-4">
        <i class="bi bi-gear-fill text-primary" style="font-size: 3rem;"></i>
        <h3 class="fw-bold mt-2">App Produção</h3>
      </div>
      <form id="form-login" onsubmit="fazerLogin(event)">
        <div class="mb-3">
          <input type="text" id="usuario" class="form-control form-control-lg bg-light border-0" placeholder="Usuário" required>
        </div>
        <div class="mb-4">
          <input type="password" id="senha" class="form-control form-control-lg bg-light border-0" placeholder="Senha" required>
        </div>
        <button type="submit" id="btn-login" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold">Entrar</button>
      </form>
    </div>
  </div>

  <div id="tela-pedidos" class="screen min-vh-100 pb-4">
    <div class="bg-gradient-primary text-white p-3 d-flex justify-content-between align-items-center shadow-sm sticky-top">
      <h5 class="mb-0 fw-bold"><i class="bi bi-list-task me-2"></i>Fila de Pedidos</h5>
      <button class="btn btn-sm btn-danger rounded-pill fw-bold px-3" onclick="sair()"><i class="bi bi-box-arrow-right"></i> Sair</button>
    </div>

    <div class="container mt-3" id="lista-pedidos">
      <div class="text-center mt-5 text-muted">
        <div class="spinner-border text-primary mb-2"></div>
        <p>Carregando pedidos...</p>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // COLE A URL DO SEU SCRIPT DO GOOGLE AQUI
    // ==========================================
    const URL_API = "https://script.google.com/macros/s/AKfycbxNoOzd7cogJ0N1g1erYKVUD-_kzlCU1TkKtR5fpKQJz4P_4R5UQuBuJ3KAghQSG3GDUQ/exec";

    // Verifica se já está logado ao abrir
    window.onload = () => {
      if(localStorage.getItem('app_auth') === 'true') {
        abrirTela('tela-pedidos');
        carregarPedidos();
      }
    };

    function abrirTela(id) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    async function fazerLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const usr = document.getElementById('usuario').value;
      const pwd = document.getElementById('senha').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Entrando...';

      try {
        const res = await fetch(`${URL_API}?action=login&usuario=${usr}&senha=${pwd}`);
        const text = await res.text(); // Pega a resposta pura para debugar
        
        try {
          const data = JSON.parse(text);
          if(data.success) {
            localStorage.setItem('app_auth', 'true');
            abrirTela('tela-pedidos');
            carregarPedidos();
          } else {
            alert('Usuário ou senha incorretos!');
          }
        } catch(e) {
          alert("O servidor não retornou JSON. Retornou: " + text.substring(0, 50));
        }
      } catch (err) {
        alert('Erro de conexão: ' + err.message);
      }
      btn.disabled = false;
      btn.innerHTML = 'Entrar';
    }

    async function carregarPedidos() {
      const container = document.getElementById('lista-pedidos');
      
      try {
        const res = await fetch(`${URL_API}?action=getPedidos`);
        const data = await res.json();
        
        container.innerHTML = '';

        if(data.data.length === 0) {
          container.innerHTML = '<div class="text-center mt-5 text-muted">Nenhum pedido encontrado.</div>';
          return;
        }

        data.data.forEach(p => {
          // Logica das cores dos badges
          const bgS = p.dataSerralheria ? "bg-success text-white" : "bg-warning text-dark";
          const bgP = p.dataProducao ? "bg-success text-white" : "bg-warning text-dark";
          const bgE = p.dataExpedicao ? "bg-success text-white" : "bg-warning text-dark";

          // Textos
          const txtS = p.dataSerralheria ? `<i class="bi bi-hammer me-2"></i> Serralheria: ${p.dataSerralheria.split(' ')[0]}` : `<i class="bi bi-hammer me-2"></i> Serralheria: Pendente`;
          const txtP = p.dataProducao ? `<i class="bi bi-gear-wide-connected me-2"></i> Produção: ${p.dataProducao.split(' ')[0]}` : `<i class="bi bi-gear-wide-connected me-2"></i> Produção: Pendente`;
          const txtE = p.dataExpedicao ? `<i class="bi bi-truck me-2"></i> Expedição: ${p.dataExpedicao.split(' ')[0]}` : `<i class="bi bi-truck me-2"></i> Expedição: Pendente`;

          const card = `
            <div class="card card-mobile">
              <div class="card-body p-3">
                <div class="d-flex justify-content-between border-bottom pb-2 mb-2">
                  <h5 class="fw-bold text-primary mb-0">#${p.numero}</h5>
                  <span class="text-muted small fw-bold">${p.dataEntrega}</span>
                </div>
                <h6 class="fw-bold mb-3">${p.cliente}</h6>
                <div class="d-flex flex-column gap-1">
                  <div class="badge-fase ${bgS}">${txtS}</div>
                  <div class="badge-fase ${bgP}">${txtP}</div>
                  <div class="badge-fase ${bgE}">${txtE}</div>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        });

      } catch (err) {
        container.innerHTML = '<div class="text-center mt-5 text-danger">Erro ao carregar dados.</div>';
      }
    }

    function sair() {
      localStorage.removeItem('app_auth');
      document.getElementById('usuario').value = '';
      document.getElementById('senha').value = '';
      abrirTela('tela-login');
    }
  </script>
</body>
</html>
